<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense & Budget Visualizer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="header-content">
                <h1 class="app-title">Expense Tracker</h1>
                <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">
                    <svg class="icon sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                    <svg class="icon moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>
            </div>
            <div class="balance-container">
                <span class="balance-label">Total Balance</span>
                <div class="balance-value" id="balance">
                    <svg class="icon dollar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="1" x2="12" y2="23"></line>
                        <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
                    </svg>
                    <span id="balance-amount">0.00</span>
                </div>
            </div>
        </header>

        <main class="main-content">
            <div class="left-column">
                <section class="card form-section">
                    <h2 class="section-title">Add Transaction</h2>
                    <form id="transaction-form" class="transaction-form">
                        <div class="form-group">
                            <label for="item-name">Item Name</label>
                            <input type="text" id="item-name" name="item-name" placeholder="e.g., Coffee, Bus ticket" required>
                        </div>
                        <div class="form-group">
                            <label for="amount">Amount</label>
                            <input type="number" id="amount" name="amount" placeholder="0.00" step="0.01" min="0.01" required>
                        </div>
                        <div class="form-group">
                            <label for="category">Category</label>
                            <select id="category" name="category" required>
                                <option value="">Select category</option>
                                <option value="Food">Food</option>
                                <option value="Transport">Transport</option>
                                <option value="Fun">Fun</option>
                            </select>
                        </div>
                        <div class="form-group custom-category-group" id="custom-category-group" style="display: none;">
                            <label for="custom-category">New Category Name</label>
                            <div class="custom-category-input">
                                <input type="text" id="custom-category" name="custom-category" placeholder="Enter category name">
                                <button type="button" id="add-category-btn" class="btn btn-secondary">
                                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <line x1="12" y1="5" x2="12" y2="19"></line>
                                        <line x1="5" y1="12" x2="19" y2="12"></line>
                                    </svg>
                                </button>
                            </div>
                        </div>
                        <button type="button" id="show-custom-category" class="btn-link">+ Add Custom Category</button>
                        <button type="submit" class="btn btn-primary">
                            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="12" y1="5" x2="12" y2="19"></line>
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                            </svg>
                            Add Transaction
                        </button>
                    </form>
                </section>

                <section class="card list-section">
                    <h2 class="section-title">Transactions</h2>
                    <div class="transaction-list" id="transaction-list">
                        <div class="empty-state" id="empty-state">
                            <svg class="icon empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                                <polyline points="14 2 14 8 20 8"></polyline>
                                <line x1="12" y1="18" x2="12" y2="12"></line>
                                <line x1="9" y1="15" x2="15" y2="15"></line>
                            </svg>
                            <p>No transactions yet</p>
                            <span>Add your first transaction above</span>
                        </div>
                    </div>
                </section>
            </div>

            <div class="right-column">
                <section class="card chart-section">
                    <h2 class="section-title">Spending by Category</h2>
                    <div class="chart-container" id="chart-container">
                        <canvas id="expense-chart"></canvas>
                        <div class="chart-empty-state" id="chart-empty-state" style="display: none;">
                            <svg class="icon empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21.21 15.89A10 10 0 1 1 8 2.83"></path>
                                <path d="M22 12A10 10 0 0 0 12 2v10z"></path>
                            </svg>
                            <p>Add transactions to see chart</p>
                        </div>
                    </div>
                </section>

                <section class="card summary-section">
                    <h2 class="section-title">Monthly Summary</h2>
                    <div class="month-selector">
                        <button id="prev-month" class="btn btn-icon" aria-label="Previous month">
                            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="15 18 9 12 15 6"></polyline>
                            </svg>
                        </button>
                        <span id="current-month" class="current-month">April 2026</span>
                        <button id="next-month" class="btn btn-icon" aria-label="Next month">
                            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="9 18 15 12 9 6"></polyline>
                            </svg>
                        </button>
                    </div>
                    <div class="summary-stats">
                        <div class="stat">
                            <span class="stat-label">Income</span>
                            <span class="stat-value income" id="monthly-income">0.00</span>
                        </div>
                        <div class="stat">
                            <span class="stat-label">Expenses</span>
                            <span class="stat-value expense" id="monthly-expenses">0.00</span>
                        </div>
                        <div class="stat">
                            <span class="stat-label">Net Balance</span>
                            <span class="stat-value" id="monthly-balance">0.00</span>
                        </div>
                        <div class="stat">
                            <span class="stat-label">Transactions</span>
                            <span class="stat-value" id="monthly-count">0</span>
                        </div>
                    </div>
                </section>
            </div>
        </main>

        <div class="toast-container" id="toast-container"></div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
